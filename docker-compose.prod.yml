services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      KIN_APP_ENV: production
      GIN_MODE: release
      KIN_PORT: 8080
      KIN_DB_PATH: /data/kinsurge.db
      KIN_DIST_DIR: /app/dist
    volumes:
      - kin_surge_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  kin_surge_data:
  caddy_data:
  caddy_config:
